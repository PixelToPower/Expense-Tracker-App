<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Profit Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Stock Profit Calculator</h1>

    <section class="form">
        <h2>Calculate Your Profit </h2>
        <br>
        <br>
        <br>
        <br>

        <label class="a">Date:</label>
        <input class="c" type="date" placeholder="Enter Starting Date">
        <br>
        <br>
        <br>
        <br>
        <label class="a">Price of Stock :</label>
        <input class="c" type="number" placeholder="Enter price  of stock of different days">
        <br>
        <br>
        <br>
        <br>
        <label class="a">Hold time:</label>
        <input class="c" type="text" placeholder="Holding Period in Days">
        <br>
        <br>
        <br>
        <br>
        <button class="b">Calculate</button>


    </section>


</body>




</html>
